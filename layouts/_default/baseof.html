<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description | truncate 60 }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <!-- Favicon -->
  <link rel="icon" href="{{ .Site.Params.favicon | default "/images/logo/favicon.svg" }}" type="image/svg+xml">

  <!-- Google Fonts — Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  {{ $style := resources.Get "scss/main.scss" | toCSS | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">

  <!-- Vanilla Cookie Consent v3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vanilla-cookieconsent@3/dist/cookieconsent.css">

  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</head>
<body data-ga-id="{{ .Site.Params.googleAnalyticsId | default "" }}">
  {{ partial "header.html" . }}

  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- Main JS -->
  {{ $js := resources.Get "js/main.js" | minify | fingerprint }}
  <script src="{{ $js.RelPermalink }}" defer></script>

  <!-- Vanilla Cookie Consent v3 -->
  <script src="https://cdn.jsdelivr.net/npm/vanilla-cookieconsent@3/dist/cookieconsent.umd.js"></script>
  <script>
  (function () {
    'use strict';

    var gaId = document.body.dataset.gaId || '';

    function loadGA4() {
      if (!gaId) return;
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', gaId, { anonymize_ip: true });
    }

    function initLeafletMap() {
      var el = document.getElementById('map-embed');
      if (!el || el._leaflet_id) return;
      el.innerHTML = '';

      var partners = [
        { name: 'HIT09 SRL',         city: 'Padua, Italy',       lat: 45.4064, lon:  11.8768 },
        { name: 'LITHOZ GMBH',        city: 'Wien, Austria',      lat: 48.2082, lon:  16.3738 },
        { name: 'AENIUM ENGINEERING', city: 'Valladolid, Spain',  lat: 41.6523, lon:  -4.7245 },
        { name: 'ERGON RESEARCH',     city: 'Florence, Italy',    lat: 43.7696, lon:  11.2558 },
        { name: 'COMOTI',             city: 'Bucharest, Romania', lat: 44.4268, lon:  26.1025 }
      ];

      var map = L.map('map-embed', { center: [44.7, 12.2], zoom: 4, scrollWheelZoom: false });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 18
      }).addTo(map);

      partners.forEach(function (p) {
        L.marker([p.lat, p.lon])
          .addTo(map)
          .bindTooltip('<strong>' + p.name + '</strong>' + p.city, {
            permanent:   true,
            direction:   'right',
            className:   'map-label',
            offset:      [6, 0]
          });
      });
    }

    function enableMap() {
      var el = document.getElementById('map-embed');
      if (!el || el._leaflet_id) return;

      if (window.L) {
        initLeafletMap();
        return;
      }

      var cssLink = document.createElement('link');
      cssLink.rel = 'stylesheet';
      cssLink.href = 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css';
      document.head.appendChild(cssLink);

      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js';
      script.onload = initLeafletMap;
      document.head.appendChild(script);
    }

    CookieConsent.run({
      guiOptions: {
        consentModal: {
          layout: 'bar',
          position: 'bottom',
          equalWeightButtons: false,
          flipButtons: false
        },
        preferencesModal: {
          layout: 'box',
          equalWeightButtons: true,
          flipButtons: false
        }
      },

      onConsent: function () {
        if (CookieConsent.acceptedCategory('analytics'))  loadGA4();
        if (CookieConsent.acceptedCategory('functional')) enableMap();
      },

      onChange: function () {
        if (CookieConsent.acceptedCategory('analytics'))  loadGA4();
        if (CookieConsent.acceptedCategory('functional')) enableMap();
      },

      categories: {
        necessary: {
          enabled: true,
          readOnly: true
        },
        analytics: {
          readOnly: false,
          autoClear: {
            cookies: [
              { name: /^(_ga)/ },
              { name: '_gid' }
            ]
          }
        },
        functional: {
          readOnly: false
        }
      },

      language: {
        default: 'en',
        translations: {
          en: {
            consentModal: {
              title: 'We use cookies',
              description: 'This website uses cookies to improve your experience and to analyse traffic. You can accept all cookies, reject non-essential ones, or manage your preferences.',
              acceptAllBtn: 'Accept all',
              acceptNecessaryBtn: 'Reject non-essential',
              showPreferencesBtn: 'Manage preferences',
              footer: '<a href="/privacy-policy/">Privacy Policy</a> · <a href="/cookie-policy/">Cookie Policy</a>'
            },
            preferencesModal: {
              title: 'Cookie preferences',
              acceptAllBtn: 'Accept all',
              acceptNecessaryBtn: 'Reject all',
              savePreferencesBtn: 'Save preferences',
              closeIconLabel: 'Close modal',
              serviceCounterLabel: 'Service|Services',
              sections: [
                {
                  title: 'Strictly necessary',
                  description: 'These cookies are required for the website to function correctly. They cannot be disabled.',
                  linkedCategory: 'necessary'
                },
                {
                  title: 'Analytics',
                  description: 'Google Analytics 4 helps us understand how visitors interact with the site. All data is anonymised (IP anonymisation enabled). No data is shared with third parties for advertising.',
                  linkedCategory: 'analytics',
                  cookieTable: {
                    caption: 'Cookie list',
                    headers: { name: 'Cookie', domain: 'Domain', desc: 'Description' },
                    body: [
                      { name: '_ga',   domain: '.damager.eu', desc: 'Distinguishes users — expires after 2 years' },
                      { name: '_ga_*', domain: '.damager.eu', desc: 'Session state for GA4 — expires after 2 years' },
                      { name: '_gid',  domain: '.damager.eu', desc: 'Distinguishes users — expires after 24 hours' }
                    ]
                  }
                },
                {
                  title: 'Functional',
                  description: 'These cookies enable enhanced functionality such as the interactive consortium map. Disabling them will replace the map with a static placeholder.',
                  linkedCategory: 'functional',
                  cookieTable: {
                    caption: 'Cookie list',
                    headers: { name: 'Cookie', domain: 'Domain', desc: 'Description' },
                    body: [
                      { name: 'NID', domain: '.google.com', desc: 'Stores user preferences for Google Maps — expires after 6 months' }
                    ]
                  }
                }
              ]
            }
          }
        }
      }
    });
  })();
  </script>
</body>
</html>
